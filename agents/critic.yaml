role: critic
label: Critic Agent
purpose: Challenge weak evidence links and propose falsifiers before promotion.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - .ontology
  - topics
  - specs
  - research_plan
  - artifacts
  - agents
  write:
  - research_plan
  - artifacts
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/critic.md
  checklist: agents/checklists/critic.md
completion:
  requires:
  - task_documented
