role: research
label: Research Agent
purpose: Gather external information and organize project knowledge.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - .ontology
  - topics
  - specs
  - research_plan
  - skills
  write:
  - topics
  - artifacts
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - web_research
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/research.md
  checklist: agents/checklists/research.md
completion:
  requires:
  - task_documented
