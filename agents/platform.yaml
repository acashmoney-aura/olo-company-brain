role: platform
label: Platform Agent
purpose: Create and evolve KRAIL workflows, agent roles, prompts, skills, and operating
  conventions.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - rail.yaml
  - .krail/pack.yaml
  - .ontology
  - topics
  - specs
  - research_plan
  - skills
  - agents
  write:
  - research_plan
  - skills
  - agents
  - specs
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - validate_yaml
  - run_krail_doctor
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/platform.md
  checklist: agents/checklists/platform.md
completion:
  requires:
  - task_documented
