role: health
label: Health Agent
purpose: Audit repo hygiene, cleanup generated debris, and verify outputs.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - .ontology
  - topics
  - specs
  - research_plan
  - skills
  - artifacts
  - agents
  write:
  - research_plan
  - skills
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - verify_paths
  - verify_outputs
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/health.md
  checklist: agents/checklists/health.md
completion:
  requires:
  - task_documented
