role: coding
label: Coding Agent
purpose: Write scripts that operate on hydrated ontology data and topic context.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - .ontology
  - topics
  - specs
  - research_plan
  - skills
  - artifacts
  write:
  - topics
  - artifacts
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - execute_python
  - query_ontology
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/coding.md
  checklist: agents/checklists/coding.md
completion:
  requires:
  - task_documented
