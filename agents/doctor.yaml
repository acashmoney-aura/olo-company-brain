role: doctor
label: Doctor Agent
purpose: Audit and repair KRAIL project structure, workflow specs, graph/vector health,
  and agent scaffolding.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - rail.yaml
  - .krail/pack.yaml
  - .ontology
  - topics
  - specs
  - research_plan
  - skills
  - agents
  write:
  - research_plan
  - skills
  - agents
  - specs
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - verify_paths
  - run_krail_doctor
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/doctor.md
  checklist: agents/checklists/doctor.md
completion:
  requires:
  - task_documented
