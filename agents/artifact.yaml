role: artifact
label: Artifact Agent
purpose: Generate presentation-ready artifacts and dashboards.
runner:
  default: codex_cli
  approval_required: false
  max_retries: 3
  timeout_minutes: 20
  bash_access: true
threading:
  mode: task_scoped
permissions:
  read:
  - .ontology
  - topics
  - specs
  - research_plan
  - artifacts
  write:
  - artifacts
  - topics
  deny: []
secrets:
  allow: []
skills:
  allow_use: true
  root: skills
tools:
  allow:
  - read_repo
  - write_repo
  - render_artifact
  - grepai_search
  deny: []
prompts:
  system: agents/prompts/artifact.md
  checklist: agents/checklists/artifact.md
completion:
  requires:
  - task_documented
